name: Update World Cup dashboard data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-standings.yml"
      - "scripts/update_standings.py"
      - "tests/test_update_standings.py"
      - "app.js"
      - "index.html"
      - "styles.css"
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-world-cup-dashboard-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Fetch matches and rebuild dashboard data
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          FOOTBALL_DATA_COMPETITION: WC
          FOOTBALL_DATA_SEASON: "2026"
        run: python scripts/update_standings.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/standings.json; then
            echo "No dashboard data change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/standings.json
          git commit -m "data: update World Cup dashboard data"
          git push
